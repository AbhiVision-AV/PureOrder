<!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
<meta name="theme-color" content="#ffffff">  
<title>PureOrder</title>  
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">  
<style>  
:root {  
  --yellow: #FFC529;  
  --orange: #FE724C;  
  --dark: #1C1C1E;  
  --gray: #6B7280;  
  --light: #F5F5F7;  
  --border: #E5E7EB;  
  --white: #fff;  
  --green: #34C759;  
  --red: #FF3B30;  
}  
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }  
body { font-family:'DM Sans',sans-serif; background:var(--white); color:var(--dark); min-height:100vh; max-width:430px; margin:0 auto; }  #loadingScreen { position:fixed; inset:0; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; transition:opacity 0.4s; }
#loadingScreen.hide { opacity:0; pointer-events:none; }
.loader-logo { font-family:'Sora',sans-serif; font-size:32px; font-weight:800; }
.loader-logo span { color:var(--orange); }
.loader-bar { width:80px; height:3px; background:var(--light); border-radius:2px; overflow:hidden; margin-top:16px; }
.loader-fill { height:100%; background:linear-gradient(90deg,var(--yellow),var(--orange)); animation:ld 1.8s ease forwards; }
@keyframes ld { from{width:0} to{width:100%} }

#loginScreen { min-height:100vh; display:flex; flex-direction:column; }

.hero { flex:1; background:linear-gradient(160deg,#FFF9EC,#FFE8C8); display:flex; flex-direction:column; justify-content:flex-end; padding:60px 28px 40px; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; width:280px; height:280px; background:radial-gradient(circle,rgba(255,197,41,0.3) 0%,transparent 70%); top:-60px; right:-60px; border-radius:50%; }
.hero::after { content:''; position:absolute; width:200px; height:200px; background:radial-gradient(circle,rgba(254,114,76,0.2) 0%,transparent 70%); bottom:0; left:-40px; border-radius:50%; }

.brand { display:flex; align-items:center; gap:12px; margin-bottom:32px; position:relative; z-index:1; }
.brand-icon { width:48px; height:48px; background:var(--yellow); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 4px 12px rgba(255,197,41,0.4); }
.brand-name { font-family:'Sora',sans-serif; font-size:22px; font-weight:800; }
.brand-name span { color:var(--orange); }

.hero-title { font-family:'Sora',sans-serif; font-size:32px; font-weight:800; line-height:1.2; letter-spacing:-0.5px; margin-bottom:10px; position:relative; z-index:1; }
.hero-sub { font-size:15px; color:var(--gray); line-height:1.6; position:relative; z-index:1; }

.bottom-section { padding:32px 24px 48px; }

.btn-google { width:100%; background:white; border:1.5px solid var(--border); border-radius:16px; padding:16px; display:flex; align-items:center; justify-content:center; gap:12px; font-family:'Sora',sans-serif; font-size:15px; font-weight:700; color:var(--dark); cursor:pointer; box-shadow:0 2px 12px rgba(0,0,0,0.06); transition:all 0.2s; margin-bottom:16px; }
.btn-google:active { transform:scale(0.98); box-shadow:none; }
.btn-google img { width:20px; height:20px; }
.btn-google.loading { opacity:0.7; pointer-events:none; }

.divider { display:flex; align-items:center; gap:12px; margin-bottom:16px; color:#9CA3AF; font-size:13px; }
.divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

.info-text { text-align:center; font-size:13px; color:#9CA3AF; line-height:1.6; }
.info-text strong { color:var(--gray); }

.error-toast { background:#FEF2F2; border:1px solid #FECACA; border-radius:12px; padding:12px 16px; font-size:13px; color:var(--red); text-align:center; margin-top:12px; display:none; }

.spinner { width:18px; height:18px; border:2px solid rgba(0,0,0,0.1); border-top-color:var(--dark); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>

</head>  
<body>  <div id="loadingScreen">  
  <div class="loader-logo">Pure<span>Order</span></div>  
  <div class="loader-bar"><div class="loader-fill"></div></div>  
</div>  <div id="loginScreen" style="display:none;">  
  <div class="hero">  
    <div class="brand">  
      <div class="brand-icon">🍽️</div>  
      <div class="brand-name">Pure<span>Order</span></div>  
    </div>  
    <div class="hero-title">Fresh food,<br>delivered fast.</div>  
    <div class="hero-sub">Order from Kesinga's best local restaurants. Hot meals delivered right to your door.</div>  
  </div>  
  <div class="bottom-section">  
    <button class="btn-google" id="googleBtn" onclick="loginWithGoogle()">  
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">  
      Continue with Google  
    </button>  
    <div class="divider">for all users</div>  
    <div class="info-text">  
      Customers, restaurant owners, delivery partners<br>and admins — <strong>all sign in with Google.</strong>  
    </div>  
    <div class="error-toast" id="errBox"></div>  
  </div>  
</div>  <script type="module">  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";  
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";  
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";  
  
const firebaseConfig = {  
  apiKey: "AIzaSyA6yX_GnKJ_OiqG10DB4dguV-IM1v8wH9w",  
  authDomain: "pureorder-eca2b.firebaseapp.com",  
  projectId: "pureorder-eca2b",  
  storageBucket: "pureorder-eca2b.firebasestorage.app",  
  messagingSenderId: "641924435931",  
  appId: "1:641924435931:web:2f015b60ad7bd935fd61fe"  
};  
  
const app = initializeApp(firebaseConfig);  
const auth = getAuth(app);  
const db = getFirestore(app);  
  
function redirectTo(role) {  
  const pages = { customer:'customer.html', owner:'owner.html', delivery:'delivery.html', admin:'admin.html' };  
  window.location.href = pages[role] || 'customer.html';  
}  
  
function showError(msg) {  
  const el = document.getElementById('errBox');  
  el.textContent = msg; el.style.display = 'block';  
  setTimeout(() => el.style.display = 'none', 4000);  
}  
  
const fallback = setTimeout(() => {  
  document.getElementById('loadingScreen').classList.add('hide');  
  document.getElementById('loginScreen').style.display = 'flex';  
  document.getElementById('loginScreen').style.flexDirection = 'column';  
}, 5000);  
  
onAuthStateChanged(auth, async user => {  
  clearTimeout(fallback);  
  if (user) {  
    try {  
      const snap = await getDoc(doc(db, 'users', user.uid));  
      if (snap.exists()) {  
        redirectTo(snap.data().role || 'customer');  
      } else {  
        // New user — save as customer  
        await setDoc(doc(db, 'users', user.uid), {  
          uid: user.uid, name: user.displayName||'User',  
          email: user.email, photo: user.photoURL||'',  
          phone:'', address:'', role:'customer',  
          createdAt: serverTimestamp()  
        });  
        redirectTo('customer');  
      }  
    } catch(e) {  
      document.getElementById('loadingScreen').classList.add('hide');  
      document.getElementById('loginScreen').style.display = 'flex';  
      document.getElementById('loginScreen').style.flexDirection = 'column';  
    }  
  } else {  
    document.getElementById('loadingScreen').classList.add('hide');  
    document.getElementById('loginScreen').style.display = 'flex';  
    document.getElementById('loginScreen').style.flexDirection = 'column';  
  }  
});  
  
window.loginWithGoogle = async () => {  
  const btn = document.getElementById('googleBtn');  
  btn.innerHTML = '<div class="spinner"></div> Signing in...';  
  btn.classList.add('loading');  
  try {  
    const provider = new GoogleAuthProvider();  
    const result = await signInWithPopup(auth, provider);  
    const snap = await getDoc(doc(db, 'users', result.user.uid));  
    if (snap.exists()) {  
      redirectTo(snap.data().role || 'customer');  
    } else {  
      await setDoc(doc(db, 'users', result.user.uid), {  
        uid: result.user.uid, name: result.user.displayName||'User',  
        email: result.user.email, photo: result.user.photoURL||'',  
        phone:'', address:'', role:'customer',  
        createdAt: serverTimestamp()  
      });  
      redirectTo('customer');  
    }  
  } catch(e) {  
    btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Continue with Google';  
    btn.classList.remove('loading');  
    if (e.code !== 'auth/popup-closed-by-user') showError('Login failed. Please try again.');  
  }  
};  
</script>  </body>  
</html>
