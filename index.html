<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FE724C">
<title>PureOrder</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>  
:root {  
  --yellow: #FFC529;  
  --orange: #FE724C;  
  --dark: #1C1C1E;  
  --gray: #6B7280;  
  --light: #F5F5F7;  
  --border: #E5E7EB;  
  --white: #fff;  
  --green: #34C759;  
  --red: #FF3B30;  
}  
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }  
body { font-family:'DM Sans',sans-serif; background:var(--white); color:var(--dark); min-height:100vh; max-width:430px; margin:0 auto; }  

/* PREMIUM SPLASH SCREEN */
#loadingScreen { position:fixed; inset:0; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s; }
#loadingScreen.hide { opacity:0; visibility:hidden; pointer-events:none; }; 
.splash-logo { width:90px; height:90px; background:white; border-radius:24px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; box-shadow:0 12px 32px rgba(254,114,76,0.25); animation:pulseLogo 1.2s infinite alternate; overflow:hidden; padding:5px; border:2px solid var(--light); }
.splash-logo img { width:100%; height:100%; object-fit:contain; }
.splash-text { font-family:'Sora',sans-serif; font-size:32px; font-weight:800; color:var(--dark); letter-spacing:-0.5px; }
.splash-text span { color:var(--orange); }
@keyframes pulseLogo { 
  0% { transform: scale(0.95); box-shadow:0 8px 24px rgba(254,114,76,0.15); } 
  100% { transform: scale(1.05); box-shadow:0 16px 40px rgba(254,114,76,0.35); } 
}

/* LOGIN SCREEN UI */
#loginScreen { min-height:100vh; display:flex; flex-direction:column; }

.hero { flex:1; background:linear-gradient(160deg,#FFF9EC,#FFE8C8); display:flex; flex-direction:column; justify-content:flex-end; padding:60px 28px 40px; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; width:280px; height:280px; background:radial-gradient(circle,rgba(255,197,41,0.3) 0%,transparent 70%); top:-60px; right:-60px; border-radius:50%; }
.hero::after { content:''; position:absolute; width:200px; height:200px; background:radial-gradient(circle,rgba(254,114,76,0.2) 0%,transparent 70%); bottom:0; left:-40px; border-radius:50%; }

.brand { display:flex; align-items:center; gap:12px; margin-bottom:32px; position:relative; z-index:1; }
.brand-icon { width:48px; height:48px; background:white; border-radius:14px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(255,197,41,0.4); overflow:hidden; padding:4px; }
.brand-icon img { width:100%; height:100%; object-fit:contain; }
.brand-name { font-family:'Sora',sans-serif; font-size:22px; font-weight:800; }
.brand-name span { color:var(--orange); }

.hero-title { font-family:'Sora',sans-serif; font-size:32px; font-weight:800; line-height:1.2; letter-spacing:-0.5px; margin-bottom:10px; position:relative; z-index:1; }
.hero-sub { font-size:15px; color:var(--gray); line-height:1.6; position:relative; z-index:1; }

.bottom-section { padding:40px 24px 60px; }

.btn-google { width:100%; background:white; border:1.5px solid var(--border); border-radius:16px; padding:16px; display:flex; align-items:center; justify-content:center; gap:12px; font-family:'Sora',sans-serif; font-size:15px; font-weight:700; color:var(--dark); cursor:pointer; box-shadow:0 2px 12px rgba(0,0,0,0.06); transition:all 0.2s; }
.btn-google:active { transform:scale(0.98); box-shadow:none; }
.btn-google img { width:20px; height:20px; }
.btn-google.loading { opacity:0.7; pointer-events:none; }

.error-toast { background:#FEF2F2; border:1px solid #FECACA; border-radius:12px; padding:12px 16px; font-size:13px; color:var(--red); text-align:center; margin-top:16px; display:none; }

.spinner { width:18px; height:18px; border:2px solid rgba(0,0,0,0.1); border-top-color:var(--dark); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
@keyframes spin { to{transform:rotate(360deg)} }

/* PWA INSTALL BANNER */
.install-pwa-banner { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(150px); width: calc(100% - 32px); max-width: 398px; background: white; border: 1.5px solid var(--orange); border-radius: 16px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 8px 24px rgba(254,114,76,0.25); z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.install-pwa-banner.show { transform: translateX(-50%) translateY(0); opacity: 1; visibility: visible; }
.ipb-left { display: flex; align-items: center; gap: 12px; }
.ipb-icon { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; background: var(--light); border:1px solid #E5E7EB; }
.ipb-title { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 800; color: var(--dark); }
.ipb-sub { font-size: 11px; font-weight: 600; color: #6B7280; margin-top: 2px; }
.ipb-btn { background: var(--orange); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; box-shadow: 0 4px 10px rgba(254,114,76,0.3); text-transform: uppercase; }
.ipb-btn:active { transform: scale(0.95); }
</style>

</head>  
<body>  
  
<div id="loadingScreen">
  <div class="splash-logo"><img src="icon-192.png" alt="PureOrder"></div>
  <div class="splash-text">Pure<span>Order</span></div>
</div>

<div id="loginScreen" style="display:none;">  
  <div class="hero">  
    <div class="brand">  
      <div class="brand-icon"><img src="icon-192.png" alt="Logo"></div>  
      <div class="brand-name">Pure<span>Order</span></div>  
    </div>  
    <div class="hero-title">Fresh food,<br>delivered fast.</div>  
    <div class="hero-sub">Order from Kesinga's best local restaurants. Hot meals delivered right to your door.</div>  
  </div>  
  <div class="bottom-section">  
    <button class="btn-google" id="googleBtn" onclick="loginWithGoogle()">  
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">  
      Continue with Google  
    </button>  
    <div class="error-toast" id="errBox"></div>  
  </div>  
</div>  

<div id="installPwaBanner" class="install-pwa-banner">
  <div class="ipb-left">
    <img src="icon-192.png" class="ipb-icon" alt="App Icon">
    <div>
      <div class="ipb-title">PureOrder App</div>
      <div class="ipb-sub">Fast & Easy Ordering</div>
    </div>
  </div>
  <button id="installPwaBtnAction" class="ipb-btn">Install</button>
</div>

<script type="module">  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";  
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";  
import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";  
  
const firebaseConfig = {  
  apiKey: "AIzaSyA6yX_GnKJ_OiqG10DB4dguV-IM1v8wH9w",  
  authDomain: "pureorder-eca2b.firebaseapp.com",  
  projectId: "pureorder-eca2b",  
  storageBucket: "pureorder-eca2b.firebasestorage.app",  
  messagingSenderId: "641924435931",  
  appId: "1:641924435931:web:2f015b60ad7bd935fd61fe"  
};  
  
const app = initializeApp(firebaseConfig);  
const auth = getAuth(app);  
const db = getFirestore(app);  
  
function redirectTo(role) {  
  const pages = { customer:'customer.html', owner:'owner.html', delivery:'delivery.html', admin:'admin.html' };  
  window.location.href = pages[role] || 'customer.html';  
}  
  
function showError(msg) {  
  const el = document.getElementById('errBox');  
  el.textContent = msg; el.style.display = 'block';  
  setTimeout(() => el.style.display = 'none', 4000);  
}  
  
const fallback = setTimeout(() => {  
  document.getElementById('loadingScreen').classList.add('hide');  
  document.getElementById('loginScreen').style.display = 'flex';  
  document.getElementById('loginScreen').style.flexDirection = 'column';  
}, 5000);  

// CENTRALIZED LOGIN PROCESSOR
async function processLogin(user) {
  const email = user.email ? user.email.toLowerCase() : '';
  const userRef = doc(db, 'users', user.uid);
  const snap = await getDoc(userRef);

  if (snap.exists()) {
    const userData = snap.data();
    if (userData.role === 'customer') {
      const pendingSnap = await getDoc(doc(db, 'pending_owners', email));
      if (pendingSnap.exists()) {
        const pData = pendingSnap.data();
        await setDoc(userRef, {
          role: 'owner',
          restaurantId: pData.restaurantId,
          restaurantName: pData.restaurantName,
          phone: pData.phone || userData.phone
        }, { merge: true });
        
        try { await updateDoc(doc(db, 'restaurants', pData.restaurantId), { ownerId: user.uid }); } catch(err){}
        redirectTo('owner');
        return;
      }
    }
    redirectTo(userData.role || 'customer');
  } else {
    const pendingSnap = await getDoc(doc(db, 'pending_owners', email));

    if (pendingSnap.exists()) {
      const pData = pendingSnap.data();
      await setDoc(userRef, {
        uid: user.uid, 
        name: pData.name || user.displayName || 'Owner',  
        email: email, 
        photo: user.photoURL || '',  
        phone: pData.phone || '', 
        address: '', 
        role: 'owner', 
        restaurantId: pData.restaurantId, 
        restaurantName: pData.restaurantName,
        createdAt: serverTimestamp()  
      });
      try { await updateDoc(doc(db, 'restaurants', pData.restaurantId), { ownerId: user.uid }); } catch(err){}
      redirectTo('owner');
    } else {
      await setDoc(userRef, {  
        uid: user.uid, name: user.displayName||'User',  
        email: email, photo: user.photoURL||'',  
        phone:'', address:'', role:'customer',  
        createdAt: serverTimestamp()  
      });  
      redirectTo('customer');  
    }
  }
}
  
onAuthStateChanged(auth, async user => {  
  clearTimeout(fallback);  
  if (user) {  
    try {  
      await processLogin(user);
    } catch(e) {  
      document.getElementById('loadingScreen').classList.add('hide');  
      document.getElementById('loginScreen').style.display = 'flex';  
      document.getElementById('loginScreen').style.flexDirection = 'column';  
    }  
  } else {  
    document.getElementById('loadingScreen').classList.add('hide');  
    document.getElementById('loginScreen').style.display = 'flex';  
    document.getElementById('loginScreen').style.flexDirection = 'column';  
  }  
});  
  
window.loginWithGoogle = async () => {  
  const btn = document.getElementById('googleBtn');  
  btn.innerHTML = '<div class="spinner"></div> Signing in...';  
  btn.classList.add('loading');  
  try {  
    const provider = new GoogleAuthProvider();  
    const result = await signInWithPopup(auth, provider);  
    await processLogin(result.user);
  } catch(e) {  
    btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Continue with Google';  
    btn.classList.remove('loading');  
    if (e.code !== 'auth/popup-closed-by-user') showError('Login failed. Please try again.');  
  }  
};  

// ==========================================
// PWA AUTO-INSTALL LOGIC FOR LOGIN PAGE
// ==========================================
let deferredPrompt;
const installBanner = document.getElementById('installPwaBanner');
const installBtnAction = document.getElementById('installPwaBtnAction');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); 
    deferredPrompt = e; 
    setTimeout(() => { installBanner.classList.add('show'); }, 2000); 
});

installBtnAction.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBanner.classList.remove('show'); 
});

window.addEventListener('appinstalled', () => {
    installBanner.classList.remove('show');
    deferredPrompt = null;
});
</script>  

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('firebase-messaging-sw.js').catch(() => {});
      });
    }
  </script>

</body>  
</html>
